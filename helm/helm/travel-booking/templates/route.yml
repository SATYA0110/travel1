apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: travel-booking-routes
  namespace: travel-booking
spec:
  parentRefs:
  - name: travel-booking-gateway
    namespace: travel-booking
  
  rules:
  # Route API requests to the user-service container
  - matches:
    - path: { type: PathPrefix, value: /register }
    - path: { type: PathPrefix, value: /login }
    backendRefs:
    - name: user-service-service
      port: 3001
  # Fallback: Send everything else to the frontend container
  - matches:
    - path: { type: PathPrefix, value: / }
    backendRefs:
    - name: frontend-service
      port: 80
